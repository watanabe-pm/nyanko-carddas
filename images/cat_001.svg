<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- カード背景 -->
  <rect width="200" height="280" rx="12" fill="#1a1a2e"/>
  <!-- Nレアリティ枠（グレー系） -->
  <rect x="2" y="2" width="196" height="276" rx="11" fill="none" stroke="#aaaaaa" stroke-width="3"/>
  <rect x="6" y="6" width="188" height="268" rx="9" fill="none" stroke="#888888" stroke-width="1" opacity="0.4"/>
  <!-- 四隅デコ -->
  <circle cx="14" cy="14" r="3" fill="#aaaaaa"/>
  <circle cx="186" cy="14" r="3" fill="#aaaaaa"/>
  <circle cx="14" cy="266" r="3" fill="#aaaaaa"/>
  <circle cx="186" cy="266" r="3" fill="#aaaaaa"/>
  <!-- レアリティバッジ -->
  <rect x="12" y="12" width="22" height="16" rx="4" fill="#aaaaaa"/>
  <text x="23" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">N</text>
  <!-- イラストエリア -->
  <rect x="12" y="34" width="176" height="185" rx="8" fill="#152040"/>

  <!-- ===== 三毛猫イラスト ===== -->
  <defs>
    <clipPath id="illus1">
      <rect x="12" y="34" width="176" height="185" rx="8"/>
    </clipPath>
  </defs>
  <g clip-path="url(#illus1)">
    <!-- しっぽ（白） -->
    <path d="M 142,208 C 164,196 170,228 150,240" stroke="#f0f0f0" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- しっぽ黒パッチ -->
    <path d="M 148,224 C 158,232 160,240 150,240" stroke="#333333" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- 体（白ベース） -->
    <ellipse cx="100" cy="186" rx="40" ry="42" fill="#f0f0f0"/>
    <!-- 体・茶色パッチ（左） -->
    <ellipse cx="80" cy="178" rx="18" ry="24" fill="#c87828"/>
    <!-- 体・黒パッチ（右下） -->
    <ellipse cx="118" cy="198" rx="16" ry="18" fill="#333333"/>

    <!-- 頭（白ベース） -->
    <circle cx="100" cy="108" r="34" fill="#f0f0f0"/>
    <!-- 頭・茶色パッチ（左） -->
    <path d="M 68,108 Q 72,80 90,74 Q 96,100 86,128 Q 74,122 68,108Z" fill="#c87828"/>
    <!-- 頭・黒パッチ（右目周り） -->
    <ellipse cx="114" cy="105" rx="13" ry="15" fill="#333333" opacity="0.75"/>

    <!-- 左耳（白） -->
    <polygon points="70,97 78,63 97,87" fill="#f0f0f0"/>
    <polygon points="75,94 81,67 93,86" fill="#ffb6c1"/>
    <!-- 右耳（白） -->
    <polygon points="130,97 122,63 103,87" fill="#f0f0f0"/>
    <polygon points="125,94 119,67 107,86" fill="#ffb6c1"/>

    <!-- 左前足 -->
    <ellipse cx="84" cy="218" rx="16" ry="9" fill="#f0f0f0"/>
    <ellipse cx="80" cy="218" rx="10" ry="7" fill="#c87828"/>
    <!-- 右前足 -->
    <ellipse cx="116" cy="218" rx="16" ry="9" fill="#f0f0f0"/>
    <ellipse cx="120" cy="218" rx="10" ry="7" fill="#333333" opacity="0.75"/>

    <!-- 目（左・琥珀） -->
    <ellipse cx="88" cy="107" rx="7" ry="8" fill="#d09030"/>
    <ellipse cx="88" cy="107" rx="4" ry="6" fill="#111"/>
    <circle cx="90" cy="104" r="1.5" fill="white"/>
    <!-- 目（右・琥珀） -->
    <ellipse cx="112" cy="107" rx="7" ry="8" fill="#d09030"/>
    <ellipse cx="112" cy="107" rx="4" ry="6" fill="#111"/>
    <circle cx="114" cy="104" r="1.5" fill="white"/>

    <!-- 鼻 -->
    <polygon points="97,120 103,120 100,125" fill="#ffaaaa"/>
    <!-- 口 -->
    <path d="M 97,125 Q 100,130 103,125" stroke="#999" stroke-width="1.5" fill="none"/>
    <!-- ひげ -->
    <line x1="74" y1="118" x2="89" y2="120" stroke="#bbb" stroke-width="1"/>
    <line x1="72" y1="123" x2="89" y2="123" stroke="#bbb" stroke-width="1"/>
    <line x1="74" y1="128" x2="89" y2="126" stroke="#bbb" stroke-width="1"/>
    <line x1="126" y1="118" x2="111" y2="120" stroke="#bbb" stroke-width="1"/>
    <line x1="128" y1="123" x2="111" y2="123" stroke="#bbb" stroke-width="1"/>
    <line x1="126" y1="128" x2="111" y2="126" stroke="#bbb" stroke-width="1"/>
  </g>

  <!-- 名前プレート -->
  <rect x="12" y="224" width="176" height="44" rx="6" fill="#0d1525"/>
  <text x="100" y="250" text-anchor="middle" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="16" font-weight="bold" fill="#cccccc">三毛猫</text>
  <text x="100" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888888">CALICO</text>
</svg>
