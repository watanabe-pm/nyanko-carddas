    <line x1="80" y1="210" x2="80" y2="219" stroke="#6677aa" stroke-width="1.3" opacity="0.7"/>
    <line x1="86" y1="212" x2="86" y2="220" stroke="#6677aa" stroke-width="1.3" opacity="0.7"/>
    <line x1="114" y1="212" x2="114" y2="220" stroke="#6677aa" stroke-width="1.3" opacity="0.7"/>
    <line x1="120" y1="210" x2="120" y2="219" stroke="#6677aa" stroke-width="1.3" opacity="0.7"/>
    <line x1="128" y1="210" x2="128" y2="219" stroke="#6677aa" stroke-width="1.3" opacity="0.7"/>
    <line x1="134" y1="212" x2="134" y2="220" stroke="#6677aa" stroke-width="1.3" opacity="0.7"/>
