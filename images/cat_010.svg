    <line x1="94" y1="122" x2="55" y2="122" stroke="#ddeeff" stroke-width="1" opacity="0.9"/>
    <line x1="94" y1="123" x2="57" y2="129" stroke="#ddeeff" stroke-width="1" opacity="0.9"/>
    <line x1="106" y1="121" x2="144" y2="115" stroke="#ddeeff" stroke-width="1" opacity="0.9"/>
    <line x1="106" y1="122" x2="145" y2="122" stroke="#ddeeff" stroke-width="1" opacity="0.9"/>
    <line x1="106" y1="123" x2="143" y2="129" stroke="#ddeeff" stroke-width="1" opacity="0.9"/>
